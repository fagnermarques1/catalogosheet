<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Controle de Equipamentos - MAP Test</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #f4f6f8;
    color: #222;
    padding: 16px;
    max-width: 720px;
    margin: 0 auto;
  }
  h1 { font-size: 1.4rem; margin-bottom: 16px; text-align: center; }
  .banner {
    background: #fff8c5;
    border: 1px solid #d4a72c;
    color: #6b5400;
    padding: 12px;
    border-radius: 8px;
    margin-bottom: 16px;
    font-size: 0.9rem;
  }
  .banner.erro { background: #ffebe9; border-color: #cf222e; color: #cf222e; }
  .banner.hidden { display: none; }
  .tabs {
    display: flex;
    margin-bottom: 16px;
    border-radius: 8px;
    overflow: hidden;
    border: 1px solid #d0d7de;
  }
  .tab {
    flex: 1;
    padding: 12px;
    text-align: center;
    background: #fff;
    cursor: pointer;
    font-weight: 600;
    border: none;
    font-size: 1rem;
  }
  .tab.active { background: #0969da; color: #fff; }
  .panel {
    background: #fff;
    padding: 16px;
    border-radius: 8px;
    border: 1px solid #d0d7de;
    margin-bottom: 16px;
  }
  .panel.hidden { display: none; }
  label {
    display: block;
    margin-bottom: 4px;
    font-weight: 600;
    font-size: 0.9rem;
  }
  input {
    width: 100%;
    padding: 12px;
    font-size: 1.1rem;
    border: 1px solid #d0d7de;
    border-radius: 6px;
    margin-bottom: 12px;
  }
  input:focus { outline: 2px solid #0969da; border-color: #0969da; }
  button.primary {
    width: 100%;
    padding: 14px;
    font-size: 1rem;
    background: #0969da;
    color: #fff;
    border: none;
    border-radius: 6px;
    font-weight: 600;
    cursor: pointer;
  }
  button.primary:hover { background: #0860c4; }
  button.danger { background: #cf222e; }
  button.danger:hover { background: #b41d28; }
  .msg {
    padding: 10px;
    border-radius: 6px;
    margin-bottom: 12px;
    font-size: 0.95rem;
  }
  .msg.ok { background: #dafbe1; color: #1a7f37; border: 1px solid #1a7f37; }
  .msg.err { background: #ffebe9; color: #cf222e; border: 1px solid #cf222e; }
  .msg.hidden { display: none; }
  table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 8px;
    font-size: 0.95rem;
  }
  th, td {
    padding: 10px 8px;
    text-align: left;
    border-bottom: 1px solid #eaeef2;
  }
  th { background: #f6f8fa; font-size: 0.85rem; text-transform: uppercase; }
  td.actions { width: 1%; white-space: nowrap; }
  td.actions button {
    padding: 6px 12px;
    font-size: 0.85rem;
    background: #cf222e;
    color: #fff;
    border: none;
    border-radius: 4px;
    cursor: pointer;
  }
  .count {
    font-size: 0.85rem;
    color: #57606a;
    margin-bottom: 8px;
  }
  .empty {
    text-align: center;
    color: #57606a;
    padding: 20px;
    font-style: italic;
  }
  .input-row {
    display: flex;
    gap: 8px;
    margin-bottom: 12px;
  }
  .input-row input { margin-bottom: 0; flex: 1; }
  .scan-btn {
    flex: 0 0 auto;
    padding: 0 16px;
    font-size: 1.4rem;
    background: #f6f8fa;
    border: 1px solid #d0d7de;
    border-radius: 6px;
    cursor: pointer;
    line-height: 1;
  }
  .scan-btn:hover { background: #eaeef2; }
  .scan-btn.hidden { display: none; }
  .scanner-modal {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    z-index: 1000;
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 16px;
  }
  .scanner-modal.open { display: flex; }
  .scanner-box {
    background: #000;
    width: 100%;
    max-width: 480px;
    aspect-ratio: 4 / 3;
    border-radius: 8px;
    overflow: hidden;
    position: relative;
  }
  #scanner-video {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }
  .scanner-mira {
    position: absolute;
    top: 25%;
    left: 4%;
    right: 4%;
    bottom: 25%;
    border: 3px solid rgba(255, 211, 61, 0.9);
    border-radius: 4px;
    pointer-events: none;
  }
  .scanner-zoom {
    width: 100%;
    max-width: 480px;
    margin-top: 12px;
    color: #fff;
    font-size: 0.85rem;
    display: none;
  }
  .scanner-zoom.show { display: block; }
  .scanner-zoom input[type=range] {
    width: 100%;
    margin: 6px 0 0;
  }
  .scanner-info {
    color: #9aa4ad;
    margin-top: 6px;
    font-size: 0.75rem;
    text-align: center;
  }
  .scanner-title {
    color: #fff;
    margin-bottom: 12px;
    font-weight: 600;
    text-align: center;
  }
  .scanner-error {
    color: #ffb3b0;
    margin-top: 12px;
    text-align: center;
    font-size: 0.9rem;
    max-width: 480px;
  }
  .scanner-preview {
    color: #fff;
    margin-top: 10px;
    text-align: center;
    font-size: 0.95rem;
    min-height: 1.2em;
  }
  .scanner-preview strong { color: #ffd33d; }
  .scanner-actions {
    display: flex;
    gap: 12px;
    margin-top: 16px;
    flex-wrap: wrap;
    justify-content: center;
  }
  .scanner-actions button {
    padding: 12px 20px;
    border: none;
    border-radius: 6px;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
  }
  .scanner-cancel { background: #fff; color: #222; }
  .scanner-torch { background: #444; color: #fff; }
  .scanner-torch.on { background: #ffd33d; color: #222; }
  .scanner-torch.hidden { display: none; }
</style>
<script src="https://unpkg.com/@zxing/library@0.21.3/umd/index.min.js"></script>
</head>
<body>

<h1>Controle de Equipamentos — MAP Test</h1>

<div class="banner hidden" id="banner"></div>

<div class="tabs">
  <button class="tab active" data-tab="vincular">Vincular</button>
  <button class="tab" data-tab="devolver">Devolver</button>
  <button class="tab" data-tab="lista">Em uso</button>
</div>

<!-- Vincular -->
<div class="panel" id="panel-vincular">
  <div class="msg hidden" id="msg-vincular"></div>
  <form id="form-vincular" autocomplete="off">
    <label for="v-equip">Código do equipamento (bipar ou digitar)</label>
    <div class="input-row">
      <input type="text" id="v-equip" inputmode="text" autofocus required>
      <button type="button" class="scan-btn hidden" id="scan-v" title="Ler com a câmera" aria-label="Ler com a câmera">📷</button>
    </div>

    <label for="v-sala">Sala</label>
    <input type="text" id="v-sala" inputmode="text" required>

    <button type="submit" class="primary">Vincular</button>
  </form>
</div>

<!-- Devolver -->
<div class="panel hidden" id="panel-devolver">
  <div class="msg hidden" id="msg-devolver"></div>
  <form id="form-devolver" autocomplete="off">
    <label for="d-equip">Código do equipamento (bipar ou digitar)</label>
    <div class="input-row">
      <input type="text" id="d-equip" inputmode="text" required>
      <button type="button" class="scan-btn hidden" id="scan-d" title="Ler com a câmera" aria-label="Ler com a câmera">📷</button>
    </div>
    <button type="submit" class="primary danger">Devolver</button>
  </form>
</div>

<!-- Lista -->
<div class="panel hidden" id="panel-lista">
  <div class="count" id="count"></div>
  <div id="lista-conteudo"></div>
</div>

<!-- Scanner modal -->
<div class="scanner-modal" id="scanner-modal" role="dialog" aria-modal="true">
  <div class="scanner-title" id="scanner-title">Aponte para o código de barras</div>
  <div class="scanner-box">
    <video id="scanner-video" playsinline muted></video>
    <div class="scanner-mira"></div>
  </div>
  <div class="scanner-zoom" id="scanner-zoom">
    <label for="scanner-zoom-range">Zoom: <span id="scanner-zoom-val">1.0×</span></label>
    <input type="range" id="scanner-zoom-range" min="1" max="3" step="0.1" value="1">
  </div>
  <div class="scanner-info" id="scanner-info"></div>
  <div class="scanner-preview" id="scanner-preview"></div>
  <div class="scanner-error" id="scanner-error"></div>
  <div class="scanner-actions">
    <button type="button" class="scanner-torch hidden" id="scanner-torch">🔦 Lanterna</button>
    <button type="button" class="scanner-cancel" id="scanner-cancel">Cancelar</button>
  </div>
</div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js';
import {
  getFirestore, collection, onSnapshot,
  doc, setDoc, deleteDoc
} from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js';

// ============================================================
//  CONFIGURAÇÃO DO FIREBASE — cole aqui as chaves do seu projeto
//  (Console do Firebase > Configurações do projeto > Seus apps > Web)
// ============================================================
const firebaseConfig = {
  apiKey: "AIzaSyBsXuWnfykncoLgq6ucaF0PjiJvlXelIMU",
  authDomain: "gcp-isc.firebaseapp.com",
  projectId: "gcp-isc",
  storageBucket: "gcp-isc.firebasestorage.app",
  messagingSenderId: "233110578752",
  appId: "1:233110578752:web:22405a44470f0f765e21a5",
  measurementId: "G-LYRECWQRK1"
};
// ============================================================

const COLECAO = 'equipamentos';
const configurado = firebaseConfig.apiKey && !firebaseConfig.apiKey.startsWith('COLE_');

let db = null;
let estado = {}; // espelho local do Firestore: { codigo: { sala, em } }

function mostraBanner(texto, erro) {
  const el = document.getElementById('banner');
  el.textContent = texto;
  el.className = 'banner' + (erro ? ' erro' : '');
}

function escondeBanner() {
  document.getElementById('banner').className = 'banner hidden';
}

if (configurado) {
  try {
    const app = initializeApp(firebaseConfig);
    db = getFirestore(app);
    onSnapshot(collection(db, COLECAO), (snap) => {
      estado = {};
      snap.forEach(d => { estado[d.id] = d.data(); });
      escondeBanner();
      renderLista();
    }, (err) => {
      console.error('Erro onSnapshot:', err);
      mostraBanner('Erro ao ler do banco [' + (err.code || '?') + ']: ' + err.message, true);
    });
  } catch (e) {
    console.error('Erro ao iniciar o Firebase:', e);
    mostraBanner('Erro ao iniciar o Firebase: ' + e.message, true);
  }
} else {
  mostraBanner('App ainda não configurado: cole a configuração do Firebase no index.html para compartilhar a lista entre todos.', true);
}

function normaliza(s) {
  return (s || '').trim().toUpperCase();
}

function mostraMsg(id, texto, tipo) {
  const el = document.getElementById(id);
  el.textContent = texto;
  el.className = 'msg ' + tipo;
  setTimeout(() => { el.className = 'msg hidden'; }, 3500);
}

async function vincular(equip, sala) {
  equip = normaliza(equip);
  sala = normaliza(sala);
  if (!equip || !sala) return { ok: false, msg: 'Preencha equipamento e sala.' };
  if (!db) return { ok: false, msg: 'App não configurado (Firebase).' };
  if (estado[equip]) {
    return { ok: false, msg: `Equipamento ${equip} já está vinculado à sala ${estado[equip].sala}.` };
  }
  try {
    await setDoc(doc(db, COLECAO, equip), { sala, em: new Date().toISOString() });
    return { ok: true, msg: `Equipamento ${equip} vinculado à sala ${sala}.` };
  } catch (e) {
    console.error('Erro ao salvar no Firestore:', e);
    mostraBanner('Erro ao salvar [' + (e.code || '?') + ']: ' + e.message, true);
    return { ok: false, msg: 'Erro ao salvar: ' + e.message };
  }
}

async function devolver(equip) {
  equip = normaliza(equip);
  if (!equip) return { ok: false, msg: 'Informe o código do equipamento.' };
  if (!db) return { ok: false, msg: 'App não configurado (Firebase).' };
  if (!estado[equip]) {
    return { ok: false, msg: `Equipamento ${equip} não está vinculado.` };
  }
  const sala = estado[equip].sala;
  try {
    await deleteDoc(doc(db, COLECAO, equip));
    return { ok: true, msg: `Equipamento ${equip} devolvido (estava na sala ${sala}).` };
  } catch (e) {
    console.error('Erro ao devolver no Firestore:', e);
    mostraBanner('Erro ao devolver [' + (e.code || '?') + ']: ' + e.message, true);
    return { ok: false, msg: 'Erro ao devolver: ' + e.message };
  }
}

function formatHora(iso) {
  const d = new Date(iso);
  return d.toLocaleString('pt-BR');
}

function renderLista() {
  const itens = Object.entries(estado).sort((a, b) => a[0].localeCompare(b[0]));
  const cont = document.getElementById('lista-conteudo');
  const count = document.getElementById('count');
  count.textContent = `${itens.length} equipamento(s) em uso`;
  if (itens.length === 0) {
    cont.innerHTML = '<div class="empty">Nenhum equipamento vinculado.</div>';
    return;
  }
  let html = '<table><thead><tr><th>Equipamento</th><th>Sala</th><th>Desde</th><th></th></tr></thead><tbody>';
  for (const [equip, info] of itens) {
    html += `<tr>
      <td><strong>${equip}</strong></td>
      <td>${info.sala}</td>
      <td>${formatHora(info.em)}</td>
      <td class="actions"><button data-devolver="${equip}">Devolver</button></td>
    </tr>`;
  }
  html += '</tbody></table>';
  cont.innerHTML = html;
  cont.querySelectorAll('button[data-devolver]').forEach(b => {
    b.addEventListener('click', async () => {
      const equip = b.getAttribute('data-devolver');
      if (confirm(`Devolver equipamento ${equip}?`)) {
        await devolver(equip);
        // a lista atualiza sozinha pelo onSnapshot
      }
    });
  });
}

// Tabs
document.querySelectorAll('.tab').forEach(t => {
  t.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
    t.classList.add('active');
    const tab = t.getAttribute('data-tab');
    document.getElementById('panel-vincular').classList.toggle('hidden', tab !== 'vincular');
    document.getElementById('panel-devolver').classList.toggle('hidden', tab !== 'devolver');
    document.getElementById('panel-lista').classList.toggle('hidden', tab !== 'lista');
    if (tab === 'lista') renderLista();
    if (tab === 'vincular') document.getElementById('v-equip').focus();
    if (tab === 'devolver') document.getElementById('d-equip').focus();
  });
});

// Vincular form
document.getElementById('form-vincular').addEventListener('submit', async e => {
  e.preventDefault();
  const equip = document.getElementById('v-equip').value;
  const sala = document.getElementById('v-sala').value;
  const r = await vincular(equip, sala);
  mostraMsg('msg-vincular', r.msg, r.ok ? 'ok' : 'err');
  if (r.ok) {
    document.getElementById('v-equip').value = '';
    document.getElementById('v-equip').focus();
  }
});

// Devolver form
document.getElementById('form-devolver').addEventListener('submit', async e => {
  e.preventDefault();
  const equip = document.getElementById('d-equip').value;
  const r = await devolver(equip);
  mostraMsg('msg-devolver', r.msg, r.ok ? 'ok' : 'err');
  document.getElementById('d-equip').value = '';
  document.getElementById('d-equip').focus();
});

// ===== Scanner de código de barras (câmera) =====
const temMidia = !!(navigator.mediaDevices && navigator.mediaDevices.getUserMedia);
const temDetectorNativo = 'BarcodeDetector' in window;
const temZxing = typeof ZXing !== 'undefined';
const temCamera = temMidia && (temDetectorNativo || temZxing);
const CONFIRMACOES_NECESSARIAS = 2;

let streamAtivo = null;
let detectorNativo = null;
let zxingReader = null;
let loopAtivo = false;
let alvoInputId = null;
let ultimoCodigo = null;
let confirmacoes = 0;
let lendo = false;
let torchOn = false;

function mostraBotoesScan() {
  if (!temCamera) return;
  document.getElementById('scan-v').classList.remove('hidden');
  document.getElementById('scan-d').classList.remove('hidden');
}

function atualizaPreview(texto) {
  const el = document.getElementById('scanner-preview');
  if (!texto) { el.innerHTML = '&nbsp;'; return; }
  el.innerHTML = `Lendo: <strong>${texto}</strong> (${confirmacoes}/${CONFIRMACOES_NECESSARIAS})`;
}

function tratarLeitura(texto) {
  if (lendo) return;
  const limpo = (texto || '').trim();
  if (!limpo) return;
  if (limpo === ultimoCodigo) {
    confirmacoes++;
  } else {
    ultimoCodigo = limpo;
    confirmacoes = 1;
  }
  atualizaPreview(limpo);
  if (confirmacoes >= CONFIRMACOES_NECESSARIAS) {
    lendo = true;
    const input = document.getElementById(alvoInputId);
    if (input) {
      input.value = limpo;
      fecharScanner(() => {
        if (alvoInputId === 'v-equip') {
          document.getElementById('v-sala').focus();
        } else if (alvoInputId === 'd-equip') {
          document.getElementById('form-devolver').requestSubmit();
        }
      });
    }
  }
}

async function abrirScanner(inputId) {
  alvoInputId = inputId;
  ultimoCodigo = null;
  confirmacoes = 0;
  lendo = false;
  torchOn = false;

  const modal = document.getElementById('scanner-modal');
  const erro = document.getElementById('scanner-error');
  const titulo = document.getElementById('scanner-title');
  const torchBtn = document.getElementById('scanner-torch');
  const video = document.getElementById('scanner-video');

  erro.textContent = '';
  torchBtn.classList.add('hidden');
  torchBtn.classList.remove('on');
  document.getElementById('scanner-info').textContent = '';
  document.getElementById('scanner-zoom').classList.remove('show');
  atualizaPreview(null);
  modal.classList.add('open');
  titulo.textContent = 'Aponte para o código de barras';

  try {
    streamAtivo = await navigator.mediaDevices.getUserMedia({
      audio: false,
      video: {
        facingMode: { ideal: 'environment' },
        width: { ideal: 3840, min: 1280 },
        height: { ideal: 2160, min: 720 },
        frameRate: { ideal: 30 },
      },
    });
    video.srcObject = streamAtivo;
    await video.play();

    const track = streamAtivo.getVideoTracks()[0];
    const caps = (track && track.getCapabilities) ? track.getCapabilities() : {};
    const settings = (track && track.getSettings) ? track.getSettings() : {};

    // Foco contínuo (se suportado)
    if (caps && caps.focusMode && caps.focusMode.includes('continuous')) {
      try { await track.applyConstraints({ advanced: [{ focusMode: 'continuous' }] }); } catch (e) {}
    }

    // Lanterna (se suportada pelo aparelho)
    if (caps && caps.torch) {
      torchBtn.classList.remove('hidden');
    }

    // Zoom: slider só aparece se o aparelho declarar a capability
    const zoomWrap = document.getElementById('scanner-zoom');
    const zoomRange = document.getElementById('scanner-zoom-range');
    const zoomVal = document.getElementById('scanner-zoom-val');
    if (caps && caps.zoom && typeof caps.zoom.min === 'number') {
      zoomRange.min = caps.zoom.min;
      zoomRange.max = caps.zoom.max;
      zoomRange.step = caps.zoom.step || 0.1;
      const inicial = settings.zoom || caps.zoom.min;
      zoomRange.value = inicial;
      zoomVal.textContent = parseFloat(inicial).toFixed(1) + '×';
      zoomWrap.classList.add('show');
      zoomRange.oninput = async () => {
        const z = parseFloat(zoomRange.value);
        zoomVal.textContent = z.toFixed(1) + '×';
        try { await track.applyConstraints({ advanced: [{ zoom: z }] }); } catch (e) {}
      };
    } else {
      zoomWrap.classList.remove('show');
    }

    // Linha de info com resolução real e motor (ajuda no diagnóstico)
    const motor = temDetectorNativo ? 'detector nativo' : 'ZXing';
    const resW = settings.width || '?';
    const resH = settings.height || '?';
    document.getElementById('scanner-info').textContent = `Câmera: ${resW}×${resH} · ${motor}`;

    if (temDetectorNativo) {
      const formatosSuportados = await window.BarcodeDetector.getSupportedFormats();
      const desejados = ['code_128','code_39','code_93','codabar','itf','ean_13','ean_8','upc_a','upc_e','qr_code'];
      const formatos = desejados.filter(f => formatosSuportados.includes(f));
      detectorNativo = new window.BarcodeDetector({ formats: formatos.length ? formatos : formatosSuportados });
      titulo.textContent = 'Aponte para o código de barras';
      loopAtivo = true;
      loopDeteccao(video);
    } else if (temZxing) {
      const hints = new Map();
      hints.set(ZXing.DecodeHintType.POSSIBLE_FORMATS, [
        ZXing.BarcodeFormat.CODE_128,
        ZXing.BarcodeFormat.CODE_39,
        ZXing.BarcodeFormat.CODE_93,
        ZXing.BarcodeFormat.CODABAR,
        ZXing.BarcodeFormat.ITF,
        ZXing.BarcodeFormat.QR_CODE,
      ]);
      hints.set(ZXing.DecodeHintType.TRY_HARDER, true);
      zxingReader = new ZXing.BrowserMultiFormatReader(hints, 200);
      titulo.textContent = 'Aponte para o código de barras';
      zxingReader.decodeFromVideoElement(video, (result, err) => {
        if (result) tratarLeitura(result.getText());
      });
    } else {
      erro.textContent = 'Nenhum leitor de código disponível neste navegador.';
    }
  } catch (err) {
    erro.textContent = 'Não foi possível acessar a câmera. ' + (err && err.message ? err.message : err);
  }
}

async function loopDeteccao(video) {
  if (!loopAtivo || !detectorNativo) return;
  try {
    if (video.readyState >= 2) {
      const codigos = await detectorNativo.detect(video);
      if (codigos && codigos.length > 0) {
        tratarLeitura(codigos[0].rawValue);
      }
    }
  } catch (e) { /* ignora frame */ }
  if (loopAtivo) requestAnimationFrame(() => loopDeteccao(video));
}

async function alternaLanterna() {
  if (!streamAtivo) return;
  const track = streamAtivo.getVideoTracks()[0];
  if (!track) return;
  const btn = document.getElementById('scanner-torch');
  const novoEstado = !torchOn;
  try {
    await track.applyConstraints({ advanced: [{ torch: novoEstado }] });
    torchOn = novoEstado;
    btn.classList.toggle('on', torchOn);
  } catch (e) {
    document.getElementById('scanner-error').textContent =
      'Lanterna não suportada neste dispositivo/navegador.';
    btn.classList.add('hidden');
  }
}

function fecharScanner(cb) {
  loopAtivo = false;
  if (zxingReader) {
    try { zxingReader.reset(); } catch (e) {}
    zxingReader = null;
  }
  detectorNativo = null;
  if (streamAtivo) {
    streamAtivo.getTracks().forEach(t => { try { t.stop(); } catch (e) {} });
    streamAtivo = null;
  }
  const video = document.getElementById('scanner-video');
  if (video) video.srcObject = null;
  document.getElementById('scanner-modal').classList.remove('open');
  ultimoCodigo = null;
  confirmacoes = 0;
  lendo = false;
  torchOn = false;
  atualizaPreview(null);
  if (cb) cb();
}

if (temCamera) {
  mostraBotoesScan();
  document.getElementById('scan-v').addEventListener('click', () => abrirScanner('v-equip'));
  document.getElementById('scan-d').addEventListener('click', () => abrirScanner('d-equip'));
  document.getElementById('scanner-cancel').addEventListener('click', () => fecharScanner());
  document.getElementById('scanner-torch').addEventListener('click', alternaLanterna);
}
</script>
</body>
</html>
